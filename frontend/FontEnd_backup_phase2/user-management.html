<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Người Dùng - ViralWindow</title>
    <script>
        // Suppress TailwindCSS CDN production warning
        if (typeof window !== 'undefined') { window.tailwind = window.tailwind || {}; window.tailwind.suppressWarning = true; }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/modal-system.js"></script>
    <script src="js/auth-helper.js"></script>
    <script src="js/config.js"></script>
    <script src="js/vw-modal.js"></script>
    <script src="js/user-settings.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .header-gradient {
            background: linear-gradient(135deg, #3B82F6 0%, #06B6D4 100%);
        }

        .table-row:hover {
            background-color: #f8fafc;
        }

        .status-active {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
        }

        .status-inactive {
            background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%);
        }
    </style>
    <script src="js/permission-guard.js"></script>
    <link rel="stylesheet" href="css/mobile-responsive.css">
</head>

<body class="bg-gray-100 text-gray-800">
    <!-- HEADER -->
    <div class="header-gradient p-5 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <a href="javascript:void(0)" onclick="history.back()" title="Quay lại"
                class="w-12 h-12 bg-white bg-opacity-20 rounded-lg flex items-center justify-center text-white hover:bg-opacity-30 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
            </a>
            <div>
                <h1 class="text-2xl font-bold text-white">Quản Lý Người Dùng</h1>
                <p class="text-white text-opacity-90 text-sm">Tạo và quản lý tài khoản nhân viên</p>
            </div>
        </div>
        <div class="flex gap-3">
            <a href="role-management.html"
                class="px-4 py-2 bg-white bg-opacity-20 text-white rounded-lg hover:bg-opacity-30 transition-all flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
                Quản lý Chức vụ
            </a>
            <button onclick="openUserModal()"
                class="px-4 py-2 bg-white text-blue-600 rounded-lg hover:bg-gray-100 transition-all font-semibold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                Thêm Người Dùng
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="p-6 max-w-7xl mx-auto">
        <!-- Filters -->
        <div class="bg-white rounded-2xl shadow-lg p-4 mb-6">
            <div class="flex flex-wrap gap-4 items-center">
                <div class="flex-1 min-w-[200px]">
                    <input type="text" id="searchInput" placeholder="Tìm theo tên, email, SĐT..."
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                        onkeyup="debounceSearch()">
                </div>
                <select id="roleFilter" onchange="loadUsers()"
                    class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Tất cả chức vụ</option>
                </select>
                <select id="statusFilter" onchange="loadUsers()"
                    class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Tất cả trạng thái</option>
                    <option value="1">Hoạt động</option>
                    <option value="0">Vô hiệu hóa</option>
                </select>
            </div>
        </div>

        <!-- Users Table -->
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <table class="w-full">
                <thead class="bg-gradient-to-r from-blue-600 to-cyan-600 text-white">
                    <tr>
                        <th class="px-6 py-4 text-left text-sm font-semibold">Người dùng</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold">Liên hệ</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold">Chức vụ</th>
                        <th class="px-6 py-4 text-center text-sm font-semibold">Trạng thái</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold">Đăng nhập gần nhất</th>
                        <th class="px-6 py-4 text-center text-sm font-semibold">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Users will be loaded here -->
                </tbody>
            </table>

            <!-- Empty State -->
            <div id="emptyState" class="hidden text-center py-12">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    class="w-16 h-16 mx-auto text-gray-400 mb-4">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <p class="text-gray-500 text-lg">Chưa có người dùng nào</p>
            </div>

            <!-- Pagination -->
            <div id="pagination" class="px-6 py-4 border-t border-gray-200 flex items-center justify-between">
                <div id="paginationInfo" class="text-sm text-gray-600"></div>
                <div id="paginationButtons" class="flex gap-2"></div>
            </div>
        </div>
    </div>

    <!-- User Modal -->
    <div id="userModal"
        class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 overflow-y-auto">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg m-4">
            <!-- Modal Header -->
            <div class="p-6 border-b border-gray-200 bg-gradient-to-r from-blue-600 to-cyan-600 rounded-t-2xl">
                <div class="flex justify-between items-center">
                    <h2 id="userModalTitle" class="text-xl font-bold text-white">Thêm Người Dùng Mới</h2>
                    <button onclick="closeUserModal()" class="text-white hover:text-gray-200 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Modal Body -->
            <div class="p-6">
                <form id="userForm" class="space-y-4">
                    <input type="hidden" id="userId">

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            Họ và tên <span class="text-red-500">*</span>
                        </label>
                        <input type="text" id="userFullName" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="Nguyễn Văn A">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            Email <span class="text-red-500">*</span>
                        </label>
                        <input type="email" id="userEmail" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="email@viralwindow.vn">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Số điện thoại</label>
                        <input type="tel" id="userPhone"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="0901234567">
                    </div>

                    <div id="passwordField">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            Mật khẩu <span class="text-red-500">*</span>
                        </label>
                        <input type="password" id="userPassword"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="Tối thiểu 6 ký tự">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Chức vụ</label>
                        <select id="userRole"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">-- Chọn chức vụ --</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Địa chỉ</label>
                        <input type="text" id="userAddress"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="Địa chỉ">
                    </div>
                </form>
            </div>

            <!-- Modal Footer -->
            <div class="p-6 border-t border-gray-200 bg-gray-50 flex justify-end gap-3 rounded-b-2xl">
                <button type="button" onclick="closeUserModal()"
                    class="px-6 py-2 border border-gray-300 text-gray-700 rounded-xl hover:bg-gray-100 transition-all">
                    Hủy
                </button>
                <button type="button" onclick="saveUser()"
                    class="px-6 py-2 bg-gradient-to-r from-blue-600 to-cyan-600 text-white rounded-xl hover:from-blue-700 hover:to-cyan-700 transition-all font-semibold">
                    Lưu
                </button>
            </div>
        </div>
    </div>

    <!-- Reset Password Modal -->
    <div id="resetPasswordModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md m-4">
            <div class="p-6 border-b border-gray-200 bg-gradient-to-r from-yellow-500 to-orange-500 rounded-t-2xl">
                <h2 class="text-xl font-bold text-white">Đặt Lại Mật Khẩu</h2>
            </div>
            <div class="p-6">
                <input type="hidden" id="resetUserId">
                <p id="resetUserName" class="text-gray-600 mb-4"></p>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Mật khẩu mới <span class="text-red-500">*</span>
                    </label>
                    <input type="password" id="newPassword"
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-500"
                        placeholder="Tối thiểu 6 ký tự">
                </div>
            </div>
            <div class="p-6 border-t border-gray-200 bg-gray-50 flex justify-end gap-3 rounded-b-2xl">
                <button type="button" onclick="closeResetPasswordModal()"
                    class="px-6 py-2 border border-gray-300 text-gray-700 rounded-xl hover:bg-gray-100 transition-all">
                    Hủy
                </button>
                <button type="button" onclick="submitResetPassword()"
                    class="px-6 py-2 bg-gradient-to-r from-yellow-500 to-orange-500 text-white rounded-xl hover:from-yellow-600 hover:to-orange-600 transition-all font-semibold">
                    Đặt Lại
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.API_BASE || '/api';
        let allRoles = [];
        let currentUserId = null;
        let currentPage = 1;
        let searchTimeout = null;

        // Get auth token
        function getAuthToken() {
            const token = sessionStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return null;
            }
            return token;
        }

        // Fetch with auth
        async function fetchWithAuth(url, options = {}) {
            const token = getAuthToken();
            if (!token) return null;

            options.headers = {
                ...options.headers,
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            };

            const response = await fetch(url, options);
            if (response.status === 401 || response.status === 403) {
                alert('Phiên đăng nhập hết hạn hoặc không có quyền truy cập');
                window.location.href = 'login.html';
                return null;
            }
            return response;
        }

        // Debounce search
        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => loadUsers(), 300);
        }

        // Load roles for dropdown
        async function loadRoles() {
            try {
                const response = await fetchWithAuth(`${API_BASE}/roles`);
                if (!response) return;

                const result = await response.json();
                if (result.success) {
                    allRoles = result.data;
                    const roleFilter = document.getElementById('roleFilter');
                    const userRole = document.getElementById('userRole');

                    allRoles.forEach(role => {
                        roleFilter.insertAdjacentHTML('beforeend',
                            `<option value="${role.id}">${role.name}</option>`);
                        userRole.insertAdjacentHTML('beforeend',
                            `<option value="${role.id}">${role.name}</option>`);
                    });
                }
            } catch (error) {
                console.error('Error loading roles:', error);
            }
        }

        // Load users
        async function loadUsers() {
            const search = document.getElementById('searchInput').value;
            const roleId = document.getElementById('roleFilter').value;
            const isActive = document.getElementById('statusFilter').value;

            let url = `${API_BASE}/user-management?page=${currentPage}&limit=20`;
            if (search) url += `&search=${encodeURIComponent(search)}`;
            if (roleId) url += `&role_id=${roleId}`;
            if (isActive !== '') url += `&is_active=${isActive}`;

            try {
                const response = await fetchWithAuth(url);
                if (!response) return;

                const result = await response.json();
                if (result.success) {
                    renderUsers(result.data);
                    renderPagination(result.pagination);
                }
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }

        // Render users
        function renderUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            const emptyState = document.getElementById('emptyState');

            if (!users || users.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            tbody.innerHTML = users.map(user => `
                <tr class="table-row border-b border-gray-100">
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-r from-blue-500 to-cyan-500 flex items-center justify-center text-white font-bold">
                                ${user.full_name.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <p class="font-semibold text-gray-800">${user.full_name}</p>
                                ${user.user_type === 'admin' ? '<span class="text-xs text-purple-600 font-medium">Admin</span>' : ''}
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <p class="text-gray-600">${user.email}</p>
                        <p class="text-gray-400 text-sm">${user.phone || '-'}</p>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-sm">
                            ${user.role_name || 'Chưa phân quyền'}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-3 py-1 ${user.is_active ? 'status-active' : 'status-inactive'} text-white rounded-full text-xs font-medium">
                            ${user.is_active ? 'Hoạt động' : 'Vô hiệu hóa'}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-gray-500 text-sm">
                        ${user.last_login ? formatDate(user.last_login) : 'Chưa đăng nhập'}
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex justify-center gap-2">
                            <button onclick="editUser(${user.id})" title="Chỉnh sửa"
                                class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-5 h-5">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                </svg>
                            </button>
                            <button onclick="openResetPasswordModal(${user.id}, '${user.full_name}')" title="Đặt lại mật khẩu"
                                class="p-2 text-yellow-600 hover:bg-yellow-50 rounded-lg transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-5 h-5">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                                </svg>
                            </button>
                            ${user.user_type !== 'admin' ? `
                            <button onclick="toggleUserStatus(${user.id})" title="${user.is_active ? 'Vô hiệu hóa' : 'Kích hoạt'}"
                                class="p-2 ${user.is_active ? 'text-red-600 hover:bg-red-50' : 'text-green-600 hover:bg-green-50'} rounded-lg transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-5 h-5">
                                    ${user.is_active ?
                        '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" />' :
                        '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />'
                    }
                                </svg>
                            </button>
                            ` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Render pagination
        function renderPagination(pagination) {
            const info = document.getElementById('paginationInfo');
            const buttons = document.getElementById('paginationButtons');

            if (!pagination || pagination.total === 0) {
                info.textContent = '';
                buttons.innerHTML = '';
                return;
            }

            const start = (pagination.page - 1) * pagination.limit + 1;
            const end = Math.min(pagination.page * pagination.limit, pagination.total);
            info.textContent = `Hiển thị ${start} - ${end} / ${pagination.total} người dùng`;

            let buttonsHtml = '';
            if (pagination.page > 1) {
                buttonsHtml += `<button onclick="goToPage(${pagination.page - 1})" class="px-3 py-1 border border-gray-300 rounded-lg hover:bg-gray-100">Trước</button>`;
            }
            if (pagination.page < pagination.totalPages) {
                buttonsHtml += `<button onclick="goToPage(${pagination.page + 1})" class="px-3 py-1 border border-gray-300 rounded-lg hover:bg-gray-100">Sau</button>`;
            }
            buttons.innerHTML = buttonsHtml;
        }

        // Go to page
        function goToPage(page) {
            currentPage = page;
            loadUsers();
        }

        // Format date
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('vi-VN', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Open user modal
        function openUserModal() {
            currentUserId = null;
            document.getElementById('userModalTitle').textContent = 'Thêm Người Dùng Mới';
            document.getElementById('userId').value = '';
            document.getElementById('userFullName').value = '';
            document.getElementById('userEmail').value = '';
            document.getElementById('userEmail').disabled = false;
            document.getElementById('userPhone').value = '';
            document.getElementById('userPassword').value = '';
            document.getElementById('userRole').value = '';
            document.getElementById('userAddress').value = '';
            document.getElementById('passwordField').classList.remove('hidden');
            document.getElementById('userModal').classList.remove('hidden');
            document.getElementById('userModal').classList.add('flex');
        }

        // Close user modal
        function closeUserModal() {
            document.getElementById('userModal').classList.add('hidden');
            document.getElementById('userModal').classList.remove('flex');
        }

        // Edit user
        async function editUser(id) {
            try {
                const response = await fetchWithAuth(`${API_BASE}/user-management/${id}`);
                if (!response) return;

                const result = await response.json();
                if (result.success) {
                    const user = result.data;
                    currentUserId = user.id;

                    document.getElementById('userModalTitle').textContent = 'Chỉnh Sửa Người Dùng';
                    document.getElementById('userId').value = user.id;
                    document.getElementById('userFullName').value = user.full_name;
                    document.getElementById('userEmail').value = user.email;
                    document.getElementById('userEmail').disabled = true; // Cannot change email
                    document.getElementById('userPhone').value = user.phone || '';
                    document.getElementById('userRole').value = user.role_id || '';
                    document.getElementById('userAddress').value = user.address || '';
                    document.getElementById('passwordField').classList.add('hidden');

                    document.getElementById('userModal').classList.remove('hidden');
                    document.getElementById('userModal').classList.add('flex');
                }
            } catch (error) {
                console.error('Error loading user:', error);
            }
        }

        // Save user
        async function saveUser() {
            const fullName = document.getElementById('userFullName').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            const phone = document.getElementById('userPhone').value.trim();
            const password = document.getElementById('userPassword').value;
            const roleId = document.getElementById('userRole').value;
            const address = document.getElementById('userAddress').value.trim();

            if (!fullName || !email) {
                alert('Vui lòng nhập họ tên và email');
                return;
            }

            if (!currentUserId && password.length < 6) {
                alert('Mật khẩu phải có ít nhất 6 ký tự');
                return;
            }

            const data = {
                full_name: fullName,
                email,
                phone: phone || null,
                role_id: roleId || null,
                address: address || null
            };

            if (!currentUserId) {
                data.password = password;
            }

            try {
                const url = currentUserId
                    ? `${API_BASE}/user-management/${currentUserId}`
                    : `${API_BASE}/user-management`;

                const response = await fetchWithAuth(url, {
                    method: currentUserId ? 'PUT' : 'POST',
                    body: JSON.stringify(data)
                });

                if (!response) return;

                const result = await response.json();
                if (result.success) {
                    closeUserModal();
                    loadUsers();
                    alert(currentUserId ? 'Cập nhật thành công!' : 'Tạo người dùng thành công!');
                } else {
                    alert('Lỗi: ' + result.message);
                }
            } catch (error) {
                console.error('Error saving user:', error);
                alert('Lỗi khi lưu');
            }
        }

        // Toggle user status
        async function toggleUserStatus(id) {
            if (!confirm('Bạn có chắc muốn thay đổi trạng thái tài khoản này?')) return;

            try {
                const response = await fetchWithAuth(`${API_BASE}/user-management/${id}/toggle-status`, {
                    method: 'PATCH'
                });

                if (!response) return;

                const result = await response.json();
                if (result.success) {
                    loadUsers();
                } else {
                    alert('Lỗi: ' + result.message);
                }
            } catch (error) {
                console.error('Error toggling status:', error);
            }
        }

        // Open reset password modal
        function openResetPasswordModal(id, name) {
            document.getElementById('resetUserId').value = id;
            document.getElementById('resetUserName').textContent = `Đặt lại mật khẩu cho: ${name}`;
            document.getElementById('newPassword').value = '';
            document.getElementById('resetPasswordModal').classList.remove('hidden');
            document.getElementById('resetPasswordModal').classList.add('flex');
        }

        // Close reset password modal
        function closeResetPasswordModal() {
            document.getElementById('resetPasswordModal').classList.add('hidden');
            document.getElementById('resetPasswordModal').classList.remove('flex');
        }

        // Submit reset password
        async function submitResetPassword() {
            const id = document.getElementById('resetUserId').value;
            const newPassword = document.getElementById('newPassword').value;

            if (newPassword.length < 6) {
                alert('Mật khẩu phải có ít nhất 6 ký tự');
                return;
            }

            try {
                const response = await fetchWithAuth(`${API_BASE}/user-management/${id}/reset-password`, {
                    method: 'POST',
                    body: JSON.stringify({ new_password: newPassword })
                });

                if (!response) return;

                const result = await response.json();
                if (result.success) {
                    closeResetPasswordModal();
                    alert('Đặt lại mật khẩu thành công!');
                } else {
                    alert('Lỗi: ' + result.message);
                }
            } catch (error) {
                console.error('Error resetting password:', error);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadRoles();
            loadUsers();
        });
    </script>
</body>

</html>
